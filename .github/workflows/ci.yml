name: CI — Build, Test & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Unit + integration tests ────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --junit-xml=test-results.xml \
            || true

      - name: Upload test & coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-py${{ matrix.python-version }}
          path: |
            backend/test-results.xml
            backend/coverage.xml
            backend/htmlcov/

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.12'
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ── 2. Compose integration test ────────────────────────────────────────
  compose-test:
    name: Docker Compose integration
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build and start all services
        run: docker compose up --build -d

      - name: Wait for backend health check
        run: |
          echo "Waiting for backend to be healthy…"
          for i in {1..20}; do
            if docker compose ps backend | grep -q "healthy"; then
              echo "Backend is healthy."
              break
            fi
            echo "Attempt $i/20 — waiting 5s…"
            sleep 5
          done

      - name: Smoke test — health endpoint
        run: |
          curl -sf http://localhost:8080/health \
          || (docker compose logs backend && exit 1)

      - name: Print service status
        if: always()
        run: |
          docker compose ps
          echo "--- Backend logs (last 30 lines) ---"
          docker compose logs backend --tail 30

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── 3. Build & push Docker images ─────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, compose-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image: backend
          - context: ./frontend
            image: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: production
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
